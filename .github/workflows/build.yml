name: Build and Publish Package

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        openwrt:
          - version: "24.10.6"
            branch: "24.10"
            pkg_format: ipk
          - version: "25.12.2"
            branch: "25.12"
            pkg_format: apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine SDK filename
        id: sdk-name
        run: |
          VERSION="${{ matrix.openwrt.version }}"
          BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/x86/64"
          SDK_FILE=$(curl -sL "${BASE_URL}/sha256sums" | grep -oE 'openwrt-sdk-[^ ]+\.tar\.[a-z]+' | head -1)
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Could not find SDK for ${VERSION}"
            exit 1
          fi
          echo "url=${BASE_URL}/${SDK_FILE}" >> "$GITHUB_OUTPUT"
          echo "file=${SDK_FILE}" >> "$GITHUB_OUTPUT"

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: sdk.tar.*
          key: openwrt-sdk-${{ matrix.openwrt.version }}-x86-64

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: wget -q "${{ steps.sdk-name.outputs.url }}" -O "${{ steps.sdk-name.outputs.file }}"

      - name: Build package via SDK
        run: |
          mkdir -p /tmp/sdk
          tar xf ${{ steps.sdk-name.outputs.file }} --strip-components=1 -C /tmp/sdk
          # Create feed directory structure (SDK expects feed/package-name/Makefile)
          mkdir -p /tmp/feed/luci-app-proxy-arp
          ln -sf ${{ github.workspace }}/* /tmp/feed/luci-app-proxy-arp/
          ln -sf ${{ github.workspace }}/.* /tmp/feed/luci-app-proxy-arp/ 2>/dev/null || true
          cd /tmp/sdk
          cp feeds.conf.default feeds.conf
          echo "src-link proxyarp /tmp/feed" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-proxy-arp
          RELEASE=$(cd ${{ github.workspace }} && git rev-list --count HEAD)
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" /tmp/sdk/feeds/proxyarp/luci-app-proxy-arp/Makefile
          make defconfig
          make package/luci-app-proxy-arp/compile V=s -j$(nproc)

      - name: Collect packages
        run: |
          mkdir -p packages
          find /tmp/sdk/bin/ -name "luci-app-proxy-arp*.${{ matrix.openwrt.pkg_format }}" -exec cp {} packages/ \;
          echo "Collected:"
          ls -la packages/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.openwrt.branch }}
          path: packages/

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate repository
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
          USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
        run: |
          # Install usign for opkg signing
          sudo apt-get -qq install -y cmake git gcc libc6-dev >/dev/null 2>&1
          git clone -q https://git.openwrt.org/project/usign.git /tmp/usign-src
          cd /tmp/usign-src && cmake -DCMAKE_BUILD_TYPE=Release . >/dev/null && make -s && sudo cp usign /usr/local/bin/
          cd "$OLDPWD"

          for dir in artifacts/packages-*/; do
            branch=$(basename "$dir" | sed 's/packages-//')
            mkdir -p "repo/${branch}"
            cp "$dir"/* "repo/${branch}/"
          done

          # Generate opkg index for ipk dirs
          for branch_dir in repo/*/; do
            cd "$branch_dir"
            if ls *.ipk 1>/dev/null 2>&1; then
              for ipk in *.ipk; do
                tar -xOf "$ipk" ./control.tar.gz 2>/dev/null | tar xzf - --to-stdout ./control 2>/dev/null || \
                  tar -xOf "$ipk" ./control.tar.zst 2>/dev/null | zstd -d | tar xf - --to-stdout ./control 2>/dev/null || true
                echo "Filename: $ipk"
                echo "Size: $(stat -c %s "$ipk")"
                echo "SHA256sum: $(sha256sum "$ipk" | cut -d' ' -f1)"
                echo ""
              done > Packages
              gzip -9c Packages > Packages.gz
              if [ -n "$USIGN_SEC_KEY" ]; then
                echo "$USIGN_SEC_KEY" > /tmp/usign.sec
                usign -S -m Packages -s /tmp/usign.sec
                rm -f /tmp/usign.sec
              fi
            fi
            cd "$OLDPWD"
          done

          if [ -n "$USIGN_PUB_KEY" ]; then
            echo "$USIGN_PUB_KEY" > repo/proxy-arp-repo.pub
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
