name: Build and Publish Package

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        run: |
          PKG_NAME="luci-app-proxy-arp"
          PKG_VERSION="1.0.0"
          PKG_RELEASE=$(git rev-list --count HEAD)
          PKG_ARCH="all"
          PKG_FULL="${PKG_NAME}_${PKG_VERSION}-${PKG_RELEASE}_${PKG_ARCH}"

          # Prepare data tree
          mkdir -p build/control build/data
          cp -r root/* build/data/ 2>/dev/null || true
          mkdir -p build/data/www
          cp -r htdocs/* build/data/www/ 2>/dev/null || true

          INSTALLED_SIZE=$(find build/data -type f 2>/dev/null | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')

          # --- Build .ipk (opkg format for 24.10) ---
          cat > build/control/control <<EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}-${PKG_RELEASE}
          Depends: luci-base, ip-full
          Source: https://github.com/porech/luci-app-proxy-arp
          SourceName: ${PKG_NAME}
          License: MIT
          Section: luci
          SourceDateEpoch: $(date +%s)
          Maintainer: Alessandro Rinaldi
          Architecture: ${PKG_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Description: LuCI support for Proxy ARP
           Manage Proxy ARP entries via LuCI. Supports static and probe-based
           proxy ARP with optional route management.
          EOF
          sed -i 's/^          //' build/control/control

          cat > build/control/conffiles <<EOF
          /etc/config/proxy-arp
          EOF
          sed -i 's/^          //' build/control/conffiles

          cat > build/control/postinst <<'POSTINST'
          #!/bin/sh
          [ -z "${IPKG_INSTROOT}" ] && {
            /etc/init.d/rpcd restart
            /etc/init.d/proxy-arp enable
          }
          exit 0
          POSTINST
          sed -i 's/^          //' build/control/postinst
          chmod +x build/control/postinst

          cd build/control && tar czf ../control.tar.gz . && cd ../..
          cd build/data && tar czf ../data.tar.gz . && cd ../..
          echo "2.0" > build/debian-binary
          cd build && tar czf "../${PKG_FULL}.ipk" ./debian-binary ./control.tar.gz ./data.tar.gz && cd ..
          echo "Built: ${PKG_FULL}.ipk"

          # --- Build .apk (apk format for 25.12) ---
          sudo apt-get -qq update && sudo apt-get -qq install -y apk-tools 2>/dev/null || {
            wget -qO /tmp/apk-tools-static.apk "https://dl-cdn.alpinelinux.org/alpine/v3.21/main/x86_64/apk-tools-static-2.14.6-r3.apk" || true
            if [ -f /tmp/apk-tools-static.apk ]; then
              cd /tmp && tar xzf apk-tools-static.apk sbin/apk.static 2>/dev/null && sudo cp sbin/apk.static /usr/local/bin/apk && cd "$OLDPWD"
            fi
          }

          APK_NAME="${PKG_NAME}-${PKG_VERSION}-r${PKG_RELEASE}.apk"
          if command -v apk >/dev/null 2>&1; then
            apk mkpkg \
              --info "name:${PKG_NAME}" \
              --info "version:${PKG_VERSION}-r${PKG_RELEASE}" \
              --info "description:LuCI support for Proxy ARP" \
              --info "arch:${PKG_ARCH}" \
              --info "license:MIT" \
              --info "origin:https://github.com/porech/luci-app-proxy-arp" \
              --info "maintainer:Alessandro Rinaldi" \
              --info "depends:luci-base ip-full" \
              --files "build/data" \
              --output "${APK_NAME}" 2>/dev/null && echo "Built: ${APK_NAME}" || echo "WARNING: apk mkpkg failed, skipping apk build"
          else
            echo "WARNING: apk-tools not available, skipping apk build"
          fi

          echo "PKG_FULL=${PKG_FULL}" >> "$GITHUB_ENV"

      - name: Generate repository
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
          USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
        run: |
          # Install usign
          sudo apt-get -qq install -y cmake git gcc libc6-dev >/dev/null 2>&1
          git clone -q https://git.openwrt.org/project/usign.git /tmp/usign-src
          cd /tmp/usign-src && cmake -DCMAKE_BUILD_TYPE=Release . >/dev/null && make -s && sudo cp usign /usr/local/bin/
          cd "$GITHUB_WORKSPACE"

          # --- 24.10 repo (opkg / ipk) ---
          mkdir -p repo/24.10
          cp ${PKG_FULL}.ipk repo/24.10/
          cd repo/24.10
          for ipk in *.ipk; do
            [ -f "$ipk" ] || continue
            tar -xOf "$ipk" ./control.tar.gz | tar xzf - --to-stdout ./control
            echo "Filename: $ipk"
            echo "Size: $(stat -c %s "$ipk")"
            echo "SHA256sum: $(sha256sum "$ipk" | cut -d' ' -f1)"
            echo ""
          done > Packages
          gzip -9c Packages > Packages.gz
          if [ -n "$USIGN_SEC_KEY" ]; then
            echo "$USIGN_SEC_KEY" > /tmp/usign.sec
            usign -S -m Packages -s /tmp/usign.sec
            rm -f /tmp/usign.sec
          fi
          cd "$GITHUB_WORKSPACE"

          # --- 25.12 repo (apk) ---
          mkdir -p repo/25.12
          if ls *.apk 1>/dev/null 2>&1; then
            cp *.apk repo/25.12/
            cd repo/25.12
            if command -v apk >/dev/null 2>&1; then
              apk mkndx --allow-untrusted -o packages.adb *.apk 2>/dev/null || echo "WARNING: apk mkndx failed"
            fi
            cd "$GITHUB_WORKSPACE"
          fi

          # Write public key
          if [ -n "$USIGN_PUB_KEY" ]; then
            echo "$USIGN_PUB_KEY" > repo/proxy-arp-repo.pub
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
